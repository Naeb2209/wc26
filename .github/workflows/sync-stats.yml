name: Sync Player Stats

on:
  workflow_dispatch:
  schedule:
    # Mỗi 15 phút, CHỈ trong khung 23:00–11:00 giờ VN (ICT/UTC+7).
    # GitHub cron tính theo UTC → 23:00–11:00 VN = 16:00–04:00 UTC = giờ UTC 16-23,0-3.
    # Phút lệch khỏi mốc 00/15/30/45 để giảm độ trễ của scheduler GitHub.
    - cron: "7,22,37,52 16-23,0-3 * * *"

concurrency:
  group: sync-player-stats
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FOTMOB_LEAGUE_ID: ${{ vars.FOTMOB_LEAGUE_ID || '77' }}
      STATS_TOP_N: ${{ vars.STATS_TOP_N || '20' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Sync FotMob player stats
        run: npm run sync-stats

      - name: Commit updated snapshot
        shell: bash
        run: |
          if git diff --quiet -- data/db.json; then
            echo "No player-stats changes to commit."
            exit 0
          fi

          git config user.name "wc26-stats-bot"
          git config user.email "wc26-stats-bot@users.noreply.github.com"
          git add data/db.json
          git commit -m "Sync FotMob player stats"
          git push origin HEAD:main
